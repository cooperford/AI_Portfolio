{% extends 'base.html' %}

{% block title %}Cancel Booking - Campus SkillSwap{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-danger">
                <div class="card-body text-center p-5">
                    <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
                    <h3 class="fw-bold mb-3">Cancel Booking Request?</h3>
                    <p class="text-muted mb-4">
                        Are you sure you want to cancel this booking request for <strong>{{ booking.skill.title
                            }}</strong>?
                    </p>
                    <form method="POST" class="d-flex gap-2 justify-content-center">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-lg">
                            <i class="fas fa-check"></i> Yes, Cancel
                        </button>
                        <a href="{% url 'my_bookings' %}" class="btn btn-secondary btn-lg">
                            <i class="fas fa-times"></i> No, Go Back
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
