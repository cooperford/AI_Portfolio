{% extends 'base.html' %}

{% block title %}Login - Campus SkillSwap{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-5">
                    <h2 class="text-center fw-bold mb-4">
                        <i class="fas fa-sign-in-alt text-primary"></i> Login
                    </h2>

                    <p class="text-center text-muted mb-4">
                        Welcome back! Enter your credentials to continue.
                    </p>

                    <!-- Login Form -->
                    <form method="POST">
                        {% csrf_token %}

                        <!-- Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label">
                                <i class="fas fa-user"></i> Username
                            </label>
                            <input type="text" class="form-control" id="username" name="username"
                                placeholder="Enter your username" required autofocus>
                        </div>

                        <!-- Password -->
                        <div class="mb-4">
                            <label for="password" class="form-label">
                                <i class="fas fa-lock"></i> Password
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" name="password"
                                    placeholder="Enter your password" required>
                                <button class="btn btn-outline-secondary" type="button"
                                    onclick="skillSwap.togglePasswordVisibility('password')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Remember Me Checkbox -->
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="remember" name="remember">
                            <label class="form-check-label" for="remember">
                                Remember me on this device
                            </label>
                        </div>

                        <!-- Login Button -->
                        <button type="submit" class="btn btn-primary w-100 btn-lg mb-3">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>

                        <!-- Demo Credentials (for testing) -->
                        <div class="alert alert-info alert-sm small">
                            <strong>Demo Account:</strong> username: <code>admin</code>, password: <code>admin</code>
                        </div>
                    </form>

                    <hr>

                    <!-- Sign Up & Forgot Password -->
                    <div class="text-center">
                        <p class="text-muted mb-3">
                            Don't have an account?
                            <a href="{% url 'register' %}" class="text-decoration-none fw-bold">
                                Create one here
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
