{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Cooper Ford | Portfolio{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'portfolio/css/styles.css' %}">
</head>
<body>
    <header class="site-header">
        <nav class="nav container" aria-label="Main navigation">
            <a class="brand" href="{% url 'portfolio:home' %}">Home</a>
            <div class="nav-links">
                <a href="{% url 'portfolio:about' %}">About</a>
                <a href="{% url 'portfolio:projects' %}">Projects</a>
                <a href="{% url 'portfolio:skills' %}">Skills</a>
                <a href="{% url 'portfolio:resume' %}">Resume</a>
                <a href="{% url 'portfolio:contact' %}">Contact</a>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; {% now "Y" %} Cooper Ford.</p>
        </div>
    </footer>
</body>
</html>
